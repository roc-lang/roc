on:
  workflow_call:
  workflow_dispatch:

name: CI New Compiler

# Do not add permissions here! Configure them at the job level!
permissions: {}

jobs:
  # Checks that don't need to run on every OS
  check-once:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Check no tracked plan.md files
        shell: bash
        run: |
          set -euo pipefail

          matches="$(git ls-files -- ':(glob)**/plan.md')"
          if [ -n "$matches" ]; then
            echo "Tracked plan.md files are not allowed:"
            echo "$matches"
            exit 1
          fi

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # 2.2.1
        with:
          version: 0.16.0
          use-cache: true

      - name: Cache Zig dependency packages
        uses: actions/cache@v4 # ratchet:actions/cache@v4
        with:
          # Zig stores fetched packages in the `p/` subdir of the global cache.
          # Caching just that under a stable build.zig.zon-hash key keeps deps
          # present across runs: it is read every run, so it stays warm and is
          # not evicted by mlugg's churnier per-run cache. A cold runner then no
          # longer re-downloads deps from GitHub and hits HttpConnectionClosing,
          # while mlugg's own cache still handles build artifacts for speed.
          path: ${{ env.ZIG_GLOBAL_CACHE_DIR }}/p
          key: zig-deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-deps-${{ runner.os }}-${{ runner.arch }}-

      - name: zig lints
        uses: ./.github/actions/flaky-retry
        with:
          command: zig build run-check-zig-lints
          error_string_contains: "HttpConnectionClosing|build.zig.zon|TemporaryNameServerFailure|error: cannot download|EndOfStream|WriteFailed|503|Timeout|bad HTTP response code"
          retry_count: 3

      - name: code tidiness
        run: zig build run-check-tidy

      - name: Git lints
        run: zig build run-check-git-lints

      - name: check formatting
        run: zig build run-check-zig-format

      - name: Check Builtin.roc formatting
        run: zig build run-check-builtin-format

      - name: Verify Serialized Type Sizes
        run: zig build run-test-serialization-sizes

      - name: Check that test is actually wired up
        run: |
          zig build run-check-test-wiring

      - name: Check fx platform test coverage
        run: |
          zig build run-check-fx-platform-test-coverage

      - name: Check type checker patterns
        run: zig build run-check-type-checker-patterns

      - name: Check enumFromInt zero usage
        run: zig build run-check-enum-from-int-zero

      - name: Check unused suppression patterns
        run: zig build run-check-unused-suppression

      - name: Run semantic audit gate
        run: zig build run-check-semantic-audit

      - name: Check post-check architecture
        run: zig build run-check-postcheck-architecture

      - name: Check panic usage
        run: zig build run-check-panic

      - name: Check CLI global stdio usage
        run: zig build run-check-cli-global-stdio

      - name: zig snapshot tests
        run: zig build run-check-snapshots -- --debug

      - name: Run Playground Tests
        run: zig build run-test-playground -Doptimize=ReleaseSmall -- --verbose

      - name: Run echo.wasm integration test
        run: zig build run-test-echo-wasm

      # We run zig check with tracy enabled.
      # This ensure it compiles and doesn't go stale.
      - name: Checkout Tracy
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          path: tracy
          repository: wolfpld/tracy
          ref: v0.11.0

      - name: zig check
        run: |
          # Just the do super fast check step for now.
          zig build -Dno-bin -Dfuzz -Dtracy=./tracy

      - name: Run fuzz seed reproducers
        env:
          ROC_FUZZ_SEED: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          for target in tokenize parse canonicalize typecheck; do
            export ROC_FUZZ_TARGET="$target"
            export ROC_FUZZ_INPUT="/tmp/roc-${target}-fuzz-input"

            python3 - <<'PY'
          import base64
          import hashlib
          import os
          import pathlib

          seed = os.environ["ROC_FUZZ_SEED"]
          target = os.environ["ROC_FUZZ_TARGET"]
          data = bytearray()
          for index in range(8):
              data.extend(hashlib.sha256(f"{seed}:{target}:{index}".encode()).digest())

          path = pathlib.Path(os.environ["ROC_FUZZ_INPUT"])
          path.write_bytes(data)

          print(f"{target} fuzz seed: {seed}")
          print(f"{target} fuzz input base64: {base64.b64encode(data).decode()}")
          PY

            zig build "run-repro-${target}" -- "$ROC_FUZZ_INPUT"
          done

  exec-bench-checks:
    needs: check-once
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      # To `roc check` benchmark script:
      - name: setup Roc
        run: |
          curl -s -OL https://github.com/roc-lang/roc/releases/download/nightly/roc_nightly-linux_x86_64-latest.tar.gz
          # rename nightly tar
          mv $(ls | grep "roc_nightly.*tar\.gz") roc_nightly.tar.gz
          # decompress the tar
          tar -xzf roc_nightly.tar.gz
          rm roc_nightly.tar.gz
          # simplify nightly folder name
          mv roc_nightly* roc_nightly
          cd roc_nightly
          # make roc binary available
          echo "$(pwd)" >> $GITHUB_PATH

      - run: roc version

      - run: |
          roc check CONTRIBUTING/profiling/exec_bench.roc
          roc test CONTRIBUTING/profiling/exec_bench.roc

  # All LLVM-backend end-to-end coverage lives here, on every OS: eval parity
  # tests, the platforms suite built with roc build --opt=size/speed (linked by
  # the embedded lld and executed, with the fx host's leak detection), and the
  # dylib/archive build-and-run fixtures. The strJoinWithC &strDecref leak was
  # an lld-COFF misresolution that only this pipeline can catch.
  eval-llvm:
    needs: check-once
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # 2.2.1
        with:
          version: 0.16.0
          use-cache: true

      - name: Cache Zig dependency packages
        uses: actions/cache@v4 # ratchet:actions/cache@v4
        with:
          # Zig stores fetched packages in the `p/` subdir of the global cache.
          # Caching just that under a stable build.zig.zon-hash key keeps deps
          # present across runs: it is read every run, so it stays warm and is
          # not evicted by mlugg's churnier per-run cache. A cold runner then no
          # longer re-downloads deps from GitHub and hits HttpConnectionClosing,
          # while mlugg's own cache still handles build artifacts for speed.
          path: ${{ env.ZIG_GLOBAL_CACHE_DIR }}/p
          key: zig-deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-deps-${{ runner.os }}-${{ runner.arch }}-

      # The embedded lld-link resolves /defaultlib via the LIB env and roc's
      # linker locates the Windows SDK/MSVC libpaths at runtime.
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # ratchet:ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      - name: Run eval tests with LLVM backend
        if: runner.os != 'Windows'
        uses: ./.github/actions/flaky-retry
        with:
          command: zig build run-test-eval -- --llvm
          error_string_contains: "HttpConnectionClosing|build.zig.zon|TemporaryNameServerFailure|error: cannot download|EndOfStream|WriteFailed|503|Timeout|bad HTTP response code"
          retry_count: 3

      # Windows has no fork(), so the runner spawns a fresh worker process per
      # test that compiles the whole program (front-end + LIR lowering) before
      # running any backend. The TRMC/TCE "stack gate" stress tests have a
      # multi-second lowering cost (measured ~9-17s locally; backend eval itself
      # is sub-millisecond) that, on the slower hosted Windows runner under
      # full-suite concurrency, overruns the 30s default per-test timeout and is
      # killed as a HANG. POSIX uses fork-based per-backend isolation on faster
      # runners where 30s is plenty. Give Windows a larger hang budget.
      - name: Run eval tests with LLVM backend (Windows)
        if: runner.os == 'Windows'
        uses: ./.github/actions/flaky-retry
        with:
          command: zig build run-test-eval -- --llvm --timeout 120000
          error_string_contains: "HttpConnectionClosing|build.zig.zon|TemporaryNameServerFailure|error: cannot download|EndOfStream|WriteFailed|503|Timeout|bad HTTP response code"
          retry_count: 3

      - name: Run CLI platform tests (LLVM size/speed backends)
        if: runner.os != 'Windows'
        run: zig build run-test-cli -- --include-llvm --filter "[size]" --filter "[speed]"

      - name: Run CLI platform tests (LLVM size/speed backends, Windows)
        if: runner.os == 'Windows'
        run: |
          zig build run-test-cli -- --include-llvm --filter "[size]" --filter "[speed]"

      - name: Shared-library build-and-run test (roc build --opt=size)
        run: zig build run-test-dylib

      - name: Static-archive build-and-run test
        run: zig build run-test-archive

  zig-tests:
    needs: check-once
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            cpu_flag: -Dcpu=x86_64_v3
            target_flag: ''
            release_jobs_flag: ''
          - os: macos-15
            cpu_flag: ''
            target_flag: ''
            release_jobs_flag: ''
          - os: ubuntu-24.04
            cpu_flag: ""
            target_flag: -Dtarget=x86_64-linux-musl
            release_jobs_flag: ''
          - os: ubuntu-24.04-arm
            cpu_flag: ''
            target_flag: ''  # Native build for kcov (Zig 0.15.2 x86_64 has DWARF bug) # TODO ZIG 16: re-check if DWARF bug is fixed in 0.16
            release_jobs_flag: -j4  # Avoid hosted ARM runner disconnects under full ReleaseFast parallelism.
          - os: windows-2022
            cpu_flag: -Dcpu=x86_64_v3
            target_flag: ''
            release_jobs_flag: ''
          - os: windows-2025
            cpu_flag: -Dcpu=x86_64_v3
            target_flag: ''
            release_jobs_flag: ''

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # 2.2.1
        with:
          version: 0.16.0
          use-cache: true

      - name: Cache Zig dependency packages
        uses: actions/cache@v4 # ratchet:actions/cache@v4
        with:
          # Zig stores fetched packages in the `p/` subdir of the global cache.
          # Caching just that under a stable build.zig.zon-hash key keeps deps
          # present across runs: it is read every run, so it stays warm and is
          # not evicted by mlugg's churnier per-run cache. A cold runner then no
          # longer re-downloads deps from GitHub and hits HttpConnectionClosing,
          # while mlugg's own cache still handles build artifacts for speed.
          path: ${{ env.ZIG_GLOBAL_CACHE_DIR }}/p
          key: zig-deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-deps-${{ runner.os }}-${{ runner.arch }}-
      # temp fix, see https://roc.zulipchat.com/#narrow/channel/395097-compiler-development/topic/CI/near/542085291
      - name: delete llvm-config
        if: startsWith(matrix.os, 'ubuntu') && endsWith(matrix.os, '-arm')
        run: |
          sudo rm /usr/lib/llvm-18/bin/llvm-config

      - name: build roc + repro executables
        uses: ./.github/actions/flaky-retry
        with:
          command: zig build ${{ matrix.release_jobs_flag }} -Dfuzz -Dsystem-afl=false -Doptimize=ReleaseFast ${{ matrix.cpu_flag }} ${{ matrix.target_flag }}
          error_string_contains: "HttpConnectionClosing|build.zig.zon|TemporaryNameServerFailure|error: cannot download|EndOfStream|WriteFailed|503|Timeout|bad HTTP response code"
          retry_count: 3

      - name: Run Test Platforms (Unix)
        if: runner.os != 'Windows'
        run: zig build run-test-cli ${{ matrix.target_flag }}

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # ratchet:ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: ${{ matrix.os == 'windows-11-arm' && 'arm64' || 'x64' }}

      - name: Run Test Platforms (Windows)
        if: runner.os == 'Windows'
        run: |
          zig build run-test-cli

      - name: roc executable minimal check (Unix)
        if: runner.os != 'Windows'
        run: |
          ./zig-out/bin/roc check ./CONTRIBUTING/profiling/bench_repeated_check.roc

      - name: roc executable minimal check (Windows)
        if: runner.os == 'Windows'
        run: |
          zig-out\bin\roc.exe check ./CONTRIBUTING/profiling/bench_repeated_check.roc

      - name: zig snapshot tests
        run: zig build run-check-snapshots ${{ matrix.target_flag }} -- --debug

      # 1) in debug mode
      - name: build and execute tests, build repro executables
        run: zig build run-test-zig -Dfuzz -Dsystem-afl=false ${{ matrix.target_flag }}

      # 2) in release mode
      - name: Build and execute tests, build repro executables. All in release mode.
        run: zig build ${{ matrix.release_jobs_flag }} run-test-zig -Doptimize=ReleaseFast -Dfuzz -Dsystem-afl=false ${{ matrix.cpu_flag }} ${{ matrix.target_flag }}

      - name: Check for snapshot changes
        run: |
          git diff --exit-code test/snapshots

      - name: check if statically linked (ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          file ./zig-out/bin/roc | grep "statically linked"

      - name: check if statically linked (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          otool_out="$(otool -L ./zig-out/bin/roc)"
          echo "$otool_out"
          # Roc must only depend on libraries that ship with every macOS install, so it
          # stays trivial to install. FSEvents-based file watching links CoreFoundation
          # and CoreServices (which pull in libobjc); all of these are part of the OS.
          unexpected="$(echo "$otool_out" | tail -n +2 | grep -vE '^[[:space:]]+(/usr/lib/libSystem\.B\.dylib|/usr/lib/libobjc\.A\.dylib|/System/Library/Frameworks/CoreFoundation\.framework/|/System/Library/Frameworks/CoreServices\.framework/)' || true)"
          if [ -n "$unexpected" ]; then
            echo "Looks like you added a new dynamic dependency to the Roc executable, we want Roc to be super easy to install, so it should only depend on libraries that ship with macOS."
            echo "Unexpected dependencies:"
            echo "$unexpected"
            exit 1
          fi

      - name: check if statically linked (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          $imports = (Get-Command zig-out\bin\roc.exe).FileVersionInfo.ImportCharacterSet
          if ($imports) {
              echo "Looks like the executable has dynamic dependencies. We want Roc to be super easy to install, so it should be statically linked."
              echo "Dynamic dependencies found:"
              $imports | ForEach-Object { echo "  $_" }
              exit 1
          }

      # Parser code coverage - run on ARM64 Linux (native build)
      # TODO ZIG 16: re-check if DWARF bug is fixed in 0.16 — may be able to enable x86_64 coverage
      # Note: Zig 0.15.2 on x86_64 generates invalid DWARF .debug_line sections,
      # causing libdw to fail parsing user source files. ARM64 works correctly.
      - name: Install kcov dependencies
        if: matrix.os == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdw-dev libcurl4-openssl-dev

      - name: Parser Code Coverage
        if: matrix.os == 'ubuntu-24.04-arm'
        run: |
          # Build kcov and the test binary via the coverage step
          # (coverage step runs kcov and generates the report)
          zig build run-coverage-parser

          echo "=== Coverage summary ==="
          cat kcov-output/parser/parse_unit_coverage/coverage.json | jq '{total: .total_lines, covered: .covered_lines, percent: .percent_covered}'

          echo "=== Files found ==="
          cat kcov-output/parser/parse_unit_coverage/coverage.json | jq -r '.files[].file' | head -10

  zig-valgrind:
    needs: check-once
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # 2.2.1
        with:
          version: 0.16.0
          use-cache: true

      - name: Cache Zig dependency packages
        uses: actions/cache@v4 # ratchet:actions/cache@v4
        with:
          # Zig stores fetched packages in the `p/` subdir of the global cache.
          # Caching just that under a stable build.zig.zon-hash key keeps deps
          # present across runs: it is read every run, so it stays warm and is
          # not evicted by mlugg's churnier per-run cache. A cold runner then no
          # longer re-downloads deps from GitHub and hits HttpConnectionClosing,
          # while mlugg's own cache still handles build artifacts for speed.
          path: ${{ env.ZIG_GLOBAL_CACHE_DIR }}/p
          key: zig-deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-deps-${{ runner.os }}-${{ runner.arch }}-

      - name: build roc + repro executables for valgrind
        uses: ./.github/actions/flaky-retry
        with:
          command: git clean -fdx && zig build -Dfuzz -Dsystem-afl=false -Doptimize=ReleaseFast -Dcpu=x86_64_v3 -Dtarget=x86_64-linux-musl -Dstrip=false -Dshared-memory-size=268435456
          error_string_contains: "HttpConnectionClosing|build.zig.zon|TemporaryNameServerFailure|error: cannot download|EndOfStream|WriteFailed|503|Timeout|bad HTTP response code"
          retry_count: 3

      - name: install valgrind
        run: |
          # Install libc6-dbg which is required for Valgrind's function redirections
          sudo apt-get update && sudo apt-get install -y libc6-dbg
          sudo snap install valgrind --classic
          valgrind --version

      - name: valgrind platform apps
        run: |
          ./zig-out/bin/test_runner ./zig-out/bin/roc str --mode=valgrind --app=test/str/app.roc
          ./zig-out/bin/test_runner ./zig-out/bin/roc int --mode=valgrind --app=test/int/app.roc

      - name: valgrind snapshots
        run: |
          ./ci/valgrind_snapshots.sh

  zig-cross-compile:
    needs: check-once
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-linux-musl
          - aarch64-macos-none
          - arm-linux-musleabihf
          - x86-linux-musl
          - x86_64-macos-none
          - x86_64-windows-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # 2.2.1
        with:
          version: 0.16.0
          use-cache: true

      - name: Cache Zig dependency packages
        uses: actions/cache@v4 # ratchet:actions/cache@v4
        with:
          # Zig stores fetched packages in the `p/` subdir of the global cache.
          # Caching just that under a stable build.zig.zon-hash key keeps deps
          # present across runs: it is read every run, so it stays warm and is
          # not evicted by mlugg's churnier per-run cache. A cold runner then no
          # longer re-downloads deps from GitHub and hits HttpConnectionClosing,
          # while mlugg's own cache still handles build artifacts for speed.
          path: ${{ env.ZIG_GLOBAL_CACHE_DIR }}/p
          key: zig-deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-deps-${{ runner.os }}-${{ runner.arch }}-

      - name: cross compile with llvm
        uses: ./.github/actions/flaky-retry
        with:
          command: zig build -Dtarget=${{ matrix.target }}
          error_string_contains: "HttpConnectionClosing|build.zig.zon|TemporaryNameServerFailure|error: cannot download|EndOfStream|WriteFailed|503|Timeout|bad HTTP response code"
          retry_count: 3

  # Test cross-compilation with Roc's cross-compilation system (musl + glibc)
  roc-cross-compile:
    uses: ./.github/workflows/ci_cross_compile.yml

  # Check if nix-related files changed
  check-nix-changes:
    runs-on: ubuntu-24.04
    outputs:
      nix: ${{ steps.filter.outputs.nix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # ratchet:dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            nix:
              - 'build.zig'
              - 'build.zig.zon'
              - 'flake.lock'
              - '**/*.nix'

  # Test building inside nix environment
  nix-build:
    needs: [check-once, check-nix-changes]
    if: needs.check-nix-changes.outputs.nix == 'true'
    uses: ./.github/workflows/ci_zig_nix.yml

  # Benchmark interpreter performance (main vs PR)
  zig-benchmarks:
    needs: check-once
    uses: ./.github/workflows/ci_zig_benchmarks.yml
