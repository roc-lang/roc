name: Debug Win11 ARM64 build

on: [pull_request]

# Temporary workflow to root-cause the zig-0.16 win11-arm64 build failure.
#
# Run 1 (localization): `zig build ... -Doptimize=ReleaseFast` -> 13/218 steps ok.
# Run 2 (classification), from a fresh-cache serial build, established:
#   * `error: process exited with error code 5` crashes hit EVERYTHING:
#       - zstd  (pure C, via zig's bundled clang)            -> code 5
#       - builtin_compiler (-ODebug, self-hosted backend)    -> code 5
#       - roc_builtins_bc  (-fllvm, LLVM backend)            -> code 5
#       - native + cross (aarch64/x86_64-linux) + wasm32     -> code 5
#   * base58 (-OReleaseFast, compile only) SUCCEEDS (exit=0) -> zig not wholly broken.
#   * `unexpected EOF reading cached ZIR` is FALLOUT: static_lib.zig crashes as
#     wasm32 (code 5) and truncates its cache, so the native recompile then warns.
#   * The 2h timeout was a HANG right after launching the `interpreter_layout`
#     test compile (likely a crashed process stuck in Windows Error Reporting).
#
# Because the build system runs compiles in `--listen=-` server mode, the actual
# crash output is swallowed and we only ever see "error code 5". Run 3 (this file)
# runs the failing compiles DIRECTLY on the CLI (no build system, no --listen) to
# capture the real panic / stack trace, with minimal/fast inputs:
#   * trivial C   compile  -> is zig's clang/C path itself crashing?
#   * trivial zig compile  -> is basic zig codegen crashing?
#   * base58 Debug vs RF   -> backend-specific (self-hosted vs LLVM)?
#   * roc_builtins obj      -> a real failing unit, reconstructed w/o --listen.

jobs:
  debug:
    runs-on: windows-11-arm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # 2.2.1
        with:
          version: 0.16.0
          use-cache: false

      # Stop crashed processes from hanging in the WerFault dialog (suspected
      # cause of the run-2 timeout). Makes access-violations exit promptly.
      - name: Disable Windows Error Reporting UI
        shell: pwsh
        run: |
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting" /v DontShowUI /t REG_DWORD /d 1 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting" /v Disabled  /t REG_DWORD /d 1 /f

      - name: Environment info
        shell: pwsh
        run: |
          zig version
          zig env
          Write-Host "PROCESSOR_ARCHITECTURE = $env:PROCESSOR_ARCHITECTURE"
          Write-Host "Logical CPUs = $env:NUMBER_OF_PROCESSORS"
          Get-CimInstance Win32_OperatingSystem |
            Select-Object @{n='FreeMemMB';e={[math]::Round($_.FreePhysicalMemory/1024)}},
                          @{n='TotalMemMB';e={[math]::Round($_.TotalVisibleMemorySize/1024)}} |
            Format-List

      # --- trivial C: isolates zig's bundled clang / C compilation path ---
      - name: trivial C -- build-exe, ReleaseFast and Debug
        shell: bash
        continue-on-error: true
        run: |
          printf 'int main(void){return 0;}\n' > t.c
          rm -rf .zig-cache-cc
          { zig build-exe t.c -lc -OReleaseFast -femit-bin=t_c_rf.exe \
              --cache-dir .zig-cache-cc --global-cache-dir .zig-cache-cc; \
            echo "exit_rf=$?"; \
            zig build-exe t.c -lc -femit-bin=t_c_dbg.exe \
              --cache-dir .zig-cache-cc --global-cache-dir .zig-cache-cc; \
            echo "exit_dbg=$?"; } 2>&1 | tee trivial-c.log

      # --- trivial zig: isolates basic zig codegen (no C, no roc) ---
      - name: trivial zig -- build-exe, ReleaseFast and Debug
        shell: bash
        continue-on-error: true
        run: |
          printf 'pub fn main() void {}\n' > t.zig
          rm -rf .zig-cache-zz
          { zig build-exe t.zig -OReleaseFast -femit-bin=t_zig_rf.exe \
              --cache-dir .zig-cache-zz --global-cache-dir .zig-cache-zz; \
            echo "exit_rf=$?"; \
            zig build-exe t.zig -femit-bin=t_zig_dbg.exe \
              --cache-dir .zig-cache-zz --global-cache-dir .zig-cache-zz; \
            echo "exit_dbg=$?"; } 2>&1 | tee trivial-zig.log

      # --- base58 (no module deps): RF (LLVM) succeeded in run 2; does Debug
      #     (self-hosted backend) crash? Run directly to capture the trace. ---
      - name: base58 -- Debug then ReleaseFast, compile only, direct CLI
        shell: bash
        continue-on-error: true
        run: |
          rm -rf .zig-cache-b58
          { zig test src/base58/mod.zig -lc --test-no-exec -femit-bin=b58_dbg.exe \
              --cache-dir .zig-cache-b58 --global-cache-dir .zig-cache-b58; \
            echo "exit_debug=$?"; \
            zig test -OReleaseFast src/base58/mod.zig -lc --test-no-exec -femit-bin=b58_rf.exe \
              --cache-dir .zig-cache-b58 --global-cache-dir .zig-cache-b58; \
            echo "exit_rf=$?"; } 2>&1 | tee base58-direct.log

      # --- A real failing unit (roc_builtins obj, code 5 in run 2),
      #     reconstructed WITHOUT --listen so the compiler prints its crash. ---
      - name: roc_builtins obj -- ReleaseFast then Debug, direct CLI
        shell: bash
        continue-on-error: true
        run: |
          rm -rf .zig-cache-rb
          { zig build-obj -fstrip -fPIC -OReleaseFast --dep tracy --dep shim_io \
              -Mroot=src/builtins/static_lib.zig \
              -Mtracy=src/builtins/tracy_stub.zig \
              -Mshim_io=src/shim_io.zig \
              --name roc_builtins -fno-compiler-rt -femit-bin=roc_builtins_rf.o \
              --cache-dir .zig-cache-rb --global-cache-dir .zig-cache-rb; \
            echo "exit_rf=$?"; \
            zig build-obj -fstrip -fPIC --dep tracy --dep shim_io \
              -Mroot=src/builtins/static_lib.zig \
              -Mtracy=src/builtins/tracy_stub.zig \
              -Mshim_io=src/shim_io.zig \
              --name roc_builtins -fno-compiler-rt -femit-bin=roc_builtins_dbg.o \
              --cache-dir .zig-cache-rb --global-cache-dir .zig-cache-rb; \
            echo "exit_dbg=$?"; } 2>&1 | tee roc-builtins-direct.log

      - name: upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ratchet:actions/upload-artifact@v4.6.2
        with:
          name: win11-arm64-debug-logs-run3
          path: |
            *.log
          if-no-files-found: warn
