name: Debug Win11 ARM64 build

on: [pull_request]

# Temporary workflow to root-cause the zig-0.16 win11-arm64 build failure.
#
# Run 1 (localization): `zig build ... -Doptimize=ReleaseFast` -> 13/218 ok.
# Run 2 (classification): crashes ("error code 5") hit C/clang, Debug self-hosted,
#   and LLVM alike; "unexpected EOF ZIR" is just fallout from those crashes.
# Run 3 (direct CLI) NAILED the discriminator:
#     zig build-exe <trivial>.zig -OReleaseFast   -> Segmentation fault
#     zig build-exe <trivial>.c   -OReleaseFast   -> Segmentation fault
#     zig build-obj roc_builtins (RF AND Debug)   -> exit 0  (success!)
#   => ReleaseFast CODEGEN is fine; the crash is in the LINK / emit-executable
#      phase. Every final exe/lib link in the roc build is what dies.
#
# Run 4 (this file) pins down (a) link-phase vs ReleaseFast-specific, and
# (b) whether LLD is the culprit. Uses pwsh because MSYS bash's signal emulation
# eats the exit code after a native crash; pwsh records $LASTEXITCODE reliably.
# A native access-violation shows up as exit code -1073741819 (0xC0000005).

jobs:
  debug:
    runs-on: windows-11-arm
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # 2.2.1
        with:
          version: 0.16.0
          use-cache: false

      - name: Disable Windows Error Reporting UI
        shell: pwsh
        run: |
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting" /v DontShowUI /t REG_DWORD /d 1 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting" /v Disabled  /t REG_DWORD /d 1 /f

      - name: Link-phase matrix (trivial inputs, direct CLI)
        shell: pwsh
        run: |
          # GitHub's pwsh runs with ErrorActionPreference=Stop; without these a
          # native crash (non-zero exit) would throw and abort the script at the
          # first failing row, losing the -flld results. Force run-to-completion.
          $ErrorActionPreference = 'Continue'
          $PSNativeCommandUseErrorActionPreference = $false
          zig version
          'pub fn main() void {}' | Set-Content t.zig
          'int main(void){return 0;}' | Set-Content t.c
          $log = "link-matrix.log"
          if (Test-Path $log) { Remove-Item $log }

          function Run([string]$label, [string[]]$cmd) {
            "`n===== $label =====" | Tee-Object -FilePath $log -Append
            ($cmd -join ' ')       | Tee-Object -FilePath $log -Append
            $cache = ".zc-" + ($label -replace '[^A-Za-z0-9]','')
            if (Test-Path $cache) { Remove-Item -Recurse -Force $cache }
            & zig @cmd --cache-dir $cache --global-cache-dir $cache 2>&1 |
              Tee-Object -FilePath $log -Append
            "exit[$label]=$LASTEXITCODE" | Tee-Object -FilePath $log -Append
          }

          # Controls: codegen without a final link should work.
          Run 'obj-zig-RF'          @('build-obj','-OReleaseFast','-Mroot=t.zig','-femit-bin=o_zig_rf.o')
          Run 'exe-zig-RF-noemit'   @('build-exe','-OReleaseFast','-Mroot=t.zig','-fno-emit-bin')

          # The repro and its axes: link in RF vs Debug; native zig vs C.
          Run 'exe-zig-RF'          @('build-exe','-OReleaseFast','-Mroot=t.zig','-femit-bin=e_zig_rf.exe')
          Run 'exe-zig-Debug'       @('build-exe','-Mroot=t.zig','-femit-bin=e_zig_dbg.exe')
          Run 'exe-c-RF'            @('build-exe','-OReleaseFast','-lc','t.c','-femit-bin=e_c_rf.exe')

          # Which linker does the default use? Show the link invocation.
          Run 'exe-zig-RF-vlink'    @('build-exe','-OReleaseFast','-Mroot=t.zig','-femit-bin=e_zig_rf2.exe','--verbose-link')

          # Codeberg #35537: the self-hosted COFF linker crashes on Windows.
          # -fno-lld forces it (expected: crash); -flld forces LLD instead.
          # If the -flld cases SUCCEED while the default/-fno-lld ones crash,
          # then `use_lld = true` for Windows in build.zig is the workaround.
          Run 'exe-zig-RF-no-lld'   @('build-exe','-OReleaseFast','-Mroot=t.zig','-femit-bin=e_zig_rf3.exe','-fno-lld')
          Run 'exe-zig-RF-lld'      @('build-exe','-OReleaseFast','-Mroot=t.zig','-femit-bin=e_zig_rf4.exe','-flld')
          Run 'exe-zig-Debug-lld'   @('build-exe','-Mroot=t.zig','-femit-bin=e_zig_dbg_lld.exe','-flld')
          Run 'exe-c-RF-lld'        @('build-exe','-OReleaseFast','-lc','t.c','-femit-bin=e_c_rf_lld.exe','-flld')

          Write-Host "`n================ SUMMARY ================"
          Select-String -Path $log -Pattern '^exit\[' | ForEach-Object { $_.Line }

      - name: upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ratchet:actions/upload-artifact@v4.6.2
        with:
          name: win11-arm64-debug-logs-run4
          path: |
            *.log
          if-no-files-found: warn
