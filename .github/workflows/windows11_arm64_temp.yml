name: Debug Win11 ARM64 build

on: [pull_request]

# Temporary workflow to root-cause the zig-0.16 win11-arm64 build failure.
#
# Run 1 (graph/localization) established:
#   * `zig build -Dfuzz ... -Doptimize=ReleaseFast` fails: 13/218 steps ok, 84 failed.
#   * Pervasive `warning(zcu): unexpected EOF reading cached ZIR for <file>` across
#     build_runner.zig, options.zig, the test platform hosts and builtins.
#   * One hard `LLVM ERROR: Broken module found ... PHINode should have one entry
#     for each predecessor` while compiling the `fmt` module test (ReleaseFast).
#   * Subprocess exit codes 5 / 9 / 116; parallel runs hard-crashed (0xC0000005)
#     while the serial (-j1) run failed gracefully with exit 1.
#
# Run 2 (this file) CLASSIFIES the failures with isolated, single-process,
# fresh-cache reproductions so we can tell apart:
#   (a) ReleaseFast codegen crash on minimal input   -> base58 compile-only
#   (b) compile-time vs run-time failure             -> base58 --test-no-exec vs exec
#   (c) ReleaseFast-specific vs general              -> base58 Debug
#   (d) the fmt LLVM "broken module" codegen bug      -> zig build test-fmt
#   (e) is "unexpected EOF ZIR" a real cache-write bug or just fallout from
#       killed parallel processes?                    -> fresh-cache serial build

jobs:
  debug:
    runs-on: windows-11-arm
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # 2.2.1
        with:
          version: 0.16.0
          use-cache: false

      - name: Environment info
        shell: pwsh
        run: |
          zig version
          zig env
          Write-Host "PROCESSOR_ARCHITECTURE = $env:PROCESSOR_ARCHITECTURE"

      # (a)+(b) Minimal standalone module (base58 has NO module deps), compiled
      # in ReleaseFast WITHOUT running it, in a private fresh cache. This is the
      # smallest possible repro of a ReleaseFast codegen crash. Raw stderr is
      # captured directly (no build-system masking).
      - name: base58 -- ReleaseFast, compile only (--test-no-exec), fresh cache
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          rm -rf .zig-cache-a
          zig test -OReleaseFast src/base58/mod.zig -lc --test-no-exec \
            --cache-dir .zig-cache-a --global-cache-dir .zig-cache-a 2>&1 | tee a-base58-rf-compile.log
          code=${PIPESTATUS[0]}
          echo "exit=$code" | tee -a a-base58-rf-compile.log

      # (c) Same minimal module in Debug (and self-hosted backend). If Debug
      # compiles but ReleaseFast crashes, the bug is optimizer/backend specific.
      - name: base58 -- Debug, compile only (--test-no-exec), fresh cache
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          rm -rf .zig-cache-b
          zig test src/base58/mod.zig -lc --test-no-exec \
            --cache-dir .zig-cache-b --global-cache-dir .zig-cache-b 2>&1 | tee b-base58-debug-compile.log
          code=${PIPESTATUS[0]}
          echo "exit=$code" | tee -a b-base58-debug-compile.log

      # (b) Now actually compile AND run the ReleaseFast test binary. If (a)
      # compiled clean but this fails, the failure is at run time (miscompiled
      # binary or a real test failure), not at compile time.
      - name: base58 -- ReleaseFast, compile AND run, fresh cache
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          rm -rf .zig-cache-c
          zig test -OReleaseFast src/base58/mod.zig -lc \
            --cache-dir .zig-cache-c --global-cache-dir .zig-cache-c 2>&1 | tee c-base58-rf-run.log
          code=${PIPESTATUS[0]}
          echo "exit=$code" | tee -a c-base58-rf-run.log

      # (d) Reproduce the fmt LLVM "broken module" bug in isolation via the build
      # system (fmt has many module deps, so we let build.zig wire them up).
      # Fresh cache + single-threaded so output is clean and ordered.
      - name: test-fmt -- ReleaseFast, fresh cache, serial
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          rm -rf .zig-cache
          zig build test-fmt -Doptimize=ReleaseFast --verbose -j1 2>&1 | tee d-test-fmt.log
          code=${PIPESTATUS[0]}
          echo "exit=$code" | tee -a d-test-fmt.log
          echo "--- ZIR-EOF warnings in this fresh-cache serial run: ---"
          grep -c "unexpected EOF reading cached ZIR" d-test-fmt.log || true

      # (e) Definitive ZIR-cache test: fresh cache + strictly serial full
      # ReleaseFast build. If "unexpected EOF reading cached ZIR" STILL appears
      # here (no parallelism, no prior crash to truncate files), it is a genuine
      # cache-write bug. If it is gone, those warnings were fallout from killed
      # parallel processes and the real bug is codegen.
      - name: full build -- ReleaseFast, fresh cache, serial
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          rm -rf .zig-cache
          zig build -Doptimize=ReleaseFast -j1 --verbose 2>&1 | tee e-full-serial.log
          code=${PIPESTATUS[0]}
          echo "exit=$code" | tee -a e-full-serial.log
          echo "--- ZIR-EOF warning count on fresh serial build: ---"
          grep -c "unexpected EOF reading cached ZIR" e-full-serial.log || true
          echo "--- distinct compiler diagnostics: ---"
          grep -iE "LLVM ERROR|PHINode|panic|unreachable|Broken module|Build Summary" e-full-serial.log || true

      - name: upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ratchet:actions/upload-artifact@v4.6.2
        with:
          name: win11-arm64-debug-logs-run2
          path: |
            *.log
          if-no-files-found: warn
