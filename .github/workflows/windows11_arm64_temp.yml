name: Debug Win11 ARM64 build

on: [pull_request]

# Temporary workflow to root-cause the zig-0.16 win11-arm64 build failure.
#
# Run 1 (localization): `zig build ... -Doptimize=ReleaseFast` -> 13/218 ok.
# Run 2 (classification): crashes ("error code 5") hit C/clang, Debug self-hosted,
#   and LLVM alike; "unexpected EOF ZIR" is just fallout from those crashes.
# Run 3 (direct CLI): build-exe trivial crashed, build-obj roc_builtins passed
#   (looked like a link-phase bug).
# Run 4 (link matrix) OVERTURNED that: identical commands gave different results
#   - exe-zig-RF = 0 but exe-zig-RF-lld = crash (yet --verbose-link shows the
#     default already IS lld-link), build-obj crashed here but passed in run 3,
#     and one run hit 0xC0000409 (STATUS_STACK_BUFFER_OVERRUN / fastfail).
#   => The crashes are NON-DETERMINISTIC: random memory corruption inside the
#      zig 0.16-dev aarch64-windows compiler, independent of obj/exe/opt/linker.
#      (`use_lld` is NOT a fix; -fno-lld isn't even supported on arm64 COFF.)
#
# Run 5 (this file) CHARACTERIZES the flakiness: repeat the SAME trivial compile
# many times and tally exit codes. Goals:
#   * measure the per-process crash rate (explains why a 218-step build never
#     all-passes),
#   * fresh-cache (full compile each time) vs warm-cache (near no-op cache hit):
#     do crashes scale with compile work (a race in heavy compilation) or happen
#     even on trivial reruns (binary unstable at any size)?
#   * does `zig version` (no compilation at all) ever crash?
# Exit codes seen so far: 0 ok, -1073741819 = 0xC0000005 (access violation),
# -1073740791 = 0xC0000409 (stack-buffer-overrun fastfail).

jobs:
  debug:
    runs-on: windows-11-arm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # 2.2.1
        with:
          version: 0.16.0
          use-cache: false

      - name: Disable Windows Error Reporting UI
        shell: pwsh
        run: |
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting" /v DontShowUI /t REG_DWORD /d 1 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting" /v Disabled  /t REG_DWORD /d 1 /f

      - name: Flakiness characterization (repeat identical compiles, tally codes)
        shell: pwsh
        run: |
          # Run to completion regardless of native crashes; capture $LASTEXITCODE.
          $ErrorActionPreference = 'Continue'
          $PSNativeCommandUseErrorActionPreference = $false

          zig version
          Write-Host "Logical CPUs = $env:NUMBER_OF_PROCESSORS"
          'pub fn main() void {}'    | Set-Content t.zig
          'int main(void){return 0;}' | Set-Content t.c
          $log = "flaky.log"
          if (Test-Path $log) { Remove-Item $log }

          # Run $cmd $n times. freshCache=$true wipes the cache each iteration so
          # every run does a full compile; $false reuses one warm cache (mostly
          # cache hits = near no-op). Tallies exit codes and lists the iteration
          # indices that crashed.
          function Trial([string]$label, [string[]]$cmd, [int]$n, [bool]$freshCache = $true) {
            $tally = @{}
            $crashIdx = @()
            $warm = ".zcwarm-$label"
            if (-not $freshCache -and (Test-Path $warm)) { Remove-Item -Recurse -Force $warm }
            for ($i = 0; $i -lt $n; $i++) {
              $args = $cmd
              if ($cmd[0] -ne 'version') {
                $cache = if ($freshCache) { ".zc-$label-$i" } else { $warm }
                if ($freshCache -and (Test-Path $cache)) { Remove-Item -Recurse -Force $cache }
                $args = $cmd + @('--cache-dir', $cache, '--global-cache-dir', $cache)
              }
              & zig @args *> $null
              $code = $LASTEXITCODE
              $key = "$code"
              if ($tally.ContainsKey($key)) { $tally[$key]++ } else { $tally[$key] = 1 }
              if ($code -ne 0) { $crashIdx += $i }
              if ($freshCache -and $cmd[0] -ne 'version' -and (Test-Path $cache)) {
                Remove-Item -Recurse -Force $cache -ErrorAction SilentlyContinue
              }
            }
            $summary = ($tally.GetEnumerator() | Sort-Object Name |
              ForEach-Object { "exit=$($_.Name):$($_.Value)" }) -join '  '
            $fails = ($tally.GetEnumerator() | Where-Object { $_.Name -ne '0' } |
              Measure-Object -Property Value -Sum).Sum
            if (-not $fails) { $fails = 0 }
            "[$label] cache=$(if($freshCache){'fresh'}else{'warm'}) n=$n  fails=$fails  $summary" |
              Tee-Object -FilePath $log -Append
            if ($crashIdx.Count) {
              "    crashed at iters: $($crashIdx -join ',')" | Tee-Object -FilePath $log -Append
            }
          }

          Trial 'exe-RF-fresh'   @('build-exe','-OReleaseFast','-Mroot=t.zig','-femit-bin=o.exe')  40 $true
          Trial 'exe-RF-warm'    @('build-exe','-OReleaseFast','-Mroot=t.zig','-femit-bin=o.exe')  40 $false
          Trial 'obj-RF-fresh'   @('build-obj','-OReleaseFast','-Mroot=t.zig','-femit-bin=o.o')    40 $true
          Trial 'exe-Debug-fresh' @('build-exe','-Mroot=t.zig','-femit-bin=od.exe')                30 $true
          Trial 'exe-c-RF-fresh' @('build-exe','-OReleaseFast','-lc','t.c','-femit-bin=oc.exe')    20 $true
          Trial 'version'        @('version')                                                       20 $true

          Write-Host "`n================ SUMMARY ================"
          Get-Content $log

      - name: upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ratchet:actions/upload-artifact@v4.6.2
        with:
          name: win11-arm64-debug-logs-run5
          path: |
            *.log
          if-no-files-found: warn
