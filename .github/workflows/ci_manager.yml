on:
  pull_request:

# cancel current runs when a new commit is pushed
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

# Do not add permissions here! Configure them at the job level!
permissions: {}

name: CI Manager

jobs:
  check-changes:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: read
    outputs:
      zig: ${{ steps.filter.outputs.zig }}
      other_than_zig: ${{ steps.other_filter.outputs.other_than_zig }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # 4.0.1
        id: filter
        with:
          filters: |
            zig:
              - 'src/**'
              - 'test/**'
              - 'build.zig'
              - 'build.zig.zon'
              - '.github/workflows/ci_zig.yml'
              - '.github/workflows/ci_zig_nix.yml'
              - '.github/workflows/ci_cross_compile.yml'
              - '.github/workflows/ci_zig_benchmarks.yml'
              - '.github/actions/flaky-retry/action.yml'
              - 'ci/zig_lints.sh'
              - 'ci/tidy.zig'
              - 'ci/check_test_wiring.zig'
              - 'ci/custom_valgrind.sh'
              - 'ci/valgrind_snapshots.sh'
              - 'ci/zig_nix_ci.sh'
              - 'ci/valgrind.supp'
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # 4.0.1
        id: other_filter
        with:
          # Makes it so that every pattern below must match.
          # This enables the negative patterns to disable this job.
          predicate-quantifier: 'every'
          filters: |
            other_than_zig:
              - '**/*'
              - '!src/**'
              - '!test/**'
              - '!build.zig'
              - '!build.zig.zon'
              - '!.github/workflows/ci_zig.yml'
              - '!.github/workflows/ci_zig_nix.yml'
              - '!.github/workflows/ci_cross_compile.yml'
              - '!.github/workflows/ci_zig_benchmarks.yml'
              - '!.github/actions/flaky-retry/action.yml'
              - '!ci/zig_lints.sh'
              - '!ci/check_test_wiring.zig'
              - '!ci/custom_valgrind.sh'
              - '!ci/valgrind_snapshots.sh'
              - '!ci/zig_nix_ci.sh'
              - '!ci/valgrind.supp'
              - '!ci/tidy.zig'
              # Files that ci manager workflows should not run on.
              - '!.gitignore'
              - '!.reuse'
              - '!.rules'
              - '!authors'
              - '!legal_details'
              - '!LICENSE'
              - '!*.md'
              - '!src/**/*.md'
              - '!design/**'
              - '!examples/**'
              - '!docs/langref/**'

  call-zig-workflow:
    needs: check-changes
    if: needs.check-changes.outputs.zig == 'true'
    uses: ./.github/workflows/ci_zig.yml
    
  finish:
    needs: [check-changes, call-zig-workflow]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check workflow results
        run: |
          if [[ "${{ needs.check-changes.outputs.zig }}" == "true" ]]; then
            if [[ "${{ needs.call-zig-workflow.result }}" != "success" ]]; then
              echo "ci_zig.yml failed."
              exit 1
            fi
          fi
