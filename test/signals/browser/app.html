<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signals App</title>
    <link href="./signals.generated.css" rel="stylesheet">
  </head>
  <body class="min-h-screen">
    <main class="min-h-screen">
      <header class="border-b border-zinc-200 bg-white/90">
        <div class="mx-auto flex w-full max-w-6xl flex-wrap items-center justify-between gap-3 px-4 py-4 sm:px-6 lg:px-8">
          <h1 id="title" class="text-lg font-semibold text-zinc-950">Signals App</h1>
          <a class="rounded-md border border-zinc-300 bg-white px-3 py-2 text-sm font-medium text-zinc-800 shadow-sm transition hover:border-emerald-500 hover:text-emerald-700" href="./">All apps</a>
        </div>
      </header>
      <div id="error" class="mx-auto mt-4 hidden w-full max-w-6xl rounded-lg border border-amber-300 bg-amber-50 px-4 py-3 text-sm text-amber-900" hidden></div>
      <div id="app"></div>
    </main>

    <script type="module">
      import { mountSignalsApp, opsApiTextTaskHandler } from "./runtime.mjs";

      const params = new URLSearchParams(window.location.search);
      const wasmUrl = params.get("wasm") || "./counter.wasm";
      const appName = params.get("app") || "Signals App";
      const title = document.getElementById("title");
      const error = document.getElementById("error");

      document.title = appName;
      title.textContent = appName;

      try {
        await mountSignalsApp({
          wasmUrl,
          root: document.getElementById("app"),
          taskHandler: opsApiTextTaskHandler,
        });
      } catch (err) {
        error.hidden = false;
        error.classList.remove("hidden");
        error.textContent = String(err?.message || err);
      }
    </script>
  </body>
</html>
