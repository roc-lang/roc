<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signals Counter</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.45;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: Canvas;
        color: CanvasText;
      }

      main {
        box-sizing: border-box;
        width: min(100%, 760px);
        padding: 28px;
      }

      #app {
        display: grid;
        gap: 14px;
        align-items: start;
      }

      #app div {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 1.4rem;
        font-weight: 650;
      }

      h2 {
        flex-basis: 100%;
        margin: 0;
        font-size: 1.05rem;
        font-weight: 650;
      }

      button {
        min-width: 112px;
        padding: 7px 10px;
        border: 1px solid color-mix(in srgb, CanvasText 32%, transparent);
        border-radius: 6px;
        background: ButtonFace;
        color: ButtonText;
        font: inherit;
      }

      button:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Signals Counter</h1>
      <div id="app"></div>
    </main>

    <script type="module">
      import { mountSignalsApp } from "./runtime.mjs";

      const params = new URLSearchParams(window.location.search);
      const wasmUrl = params.get("wasm") || "./counter.wasm";

      await mountSignalsApp({
        wasmUrl,
        root: document.getElementById("app"),
      });
    </script>
  </body>
</html>
